  <g transform="translate(80 558)">
    <rect x="0" y="-26" width="249" height="40" rx="8" fill="#111114" stroke="#24242a" stroke-width="1"/>
    <text x="14" y="1" fill="#7cffa0"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-weight="500" font-size="20">npx squad-kit init</text>
  </g>
  <text x="1120" y="575" text-anchor="end" fill="#71717a"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-weight="500" font-size="22">squad-kit.com</text>
