<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" width="360" height="88" role="img" aria-label="squad-kit logo">
  <defs>
    <linearGradient id="wm-arrow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cffa0"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <radialGradient id="wm-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7cffa0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7cffa0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(12 12)">
    <rect x="1" y="1" width="62" height="62" rx="12" fill="#0a0a0c" stroke="#32323a" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="24" fill="url(#wm-glow)"/>
    <circle cx="14" cy="32" r="2.75" fill="#7cffa0" fill-opacity="0.35"/>
    <circle cx="22" cy="32" r="2.75" fill="#7cffa0" fill-opacity="0.65"/>
    <circle cx="30" cy="32" r="2.75" fill="#7cffa0"/>
    <path d="M38 21 L51 32 L38 43" fill="none" stroke="url(#wm-arrow)" stroke-width="3.25" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="96" y="48" fill="#ededed"
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Inter, Roboto, sans-serif"
        font-weight="700" font-size="30" letter-spacing="-0.5">squad-kit</text>
  <text x="96" y="70" fill="#7cffa0"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-weight="500" font-size="13" letter-spacing="0.2">plan once, execute cheap</text>
</svg>
